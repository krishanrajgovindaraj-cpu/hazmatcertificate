<!DOCTYPE html>
<html>
<head>
  <title>Ozellar Login</title>

  <style>
    body {
      font-family: Calibri;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: linear-gradient(#f0f1f1, #003366);
      color: white;
    }

    .login-box {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 10px;
      backdrop-filter: blur(10px);
      text-align: center;
    }

    input {
      display: block;
      width: 250px;
      padding: 10px;
      margin: 10px auto;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 20px;
      background: orange;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: white;
      color: black;
    }

    .error {
      color: red;
    }
  </style>
</head>

<body>

<div class="login-box">
  <h2>Ozellar Login</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <p id="error" class="error"></p>
</div>

<script>
  function login() {
    var user = document.getElementById("username").value;
    var pass = document.getElementById("password").value;

    const users = [
      { username: "admin", password: "1234" },
      { username: "Sudarsan", password: "Ozellar@2026" },
      { username: "Krish", password: "900338" },
      { username: "Sweta", password: "Welcome@2026" }
    ];

    let valid = users.some(u => u.username === user && u.password === pass);

    if (valid) {
      localStorage.setItem("loggedIn", "true");
      localStorage.setItem("username", user);
      window.location.href = "index.html";
    } else {
      document.getElementById("error").innerText = "Invalid Username or Password";
    }
  }
</script>

</body>
</html>
