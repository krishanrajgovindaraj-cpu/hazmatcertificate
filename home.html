<!DOCTYPE html>
<html>
<head>
  <title>Ozellar Training - Certificate Portal</title>

  <style>
    body {
      font-family: Calibri, sans-serif;
      text-align: center;
      margin: 0;
      padding-top: 100px;
      color: rgb(255, 255, 255);
      overflow-x: hidden;
    }

    /* VIDEO BACKGROUND */
    video.bg-video {
      position: fixed;
      top: 0;
      left: 0;
      min-width: 100%;
      min-height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    /* DARK OVERLAY */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: -1;
    }

    button {
      padding: 16px 18px;
      margin: 10px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background-color: #002e84;
      color: rgb(249, 249, 249);
    }

    button:hover {
      background-color: #ffffff;
      color: #003366;
      transform: scale(1.05);
    }

    .box {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      width: 60%;
      margin: auto;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
    }
    /* LOGO */
    .logo {
      width: 80px;
      margin-bottom: 10px;
      filter: drop-shadow(0 0 10px orange);
    }
    h1 {
      color: rgb(220, 143, 0);
      font-size: 32px;
      margin-bottom: 5px;
    }

    h2 {
      color: green;
      margin-top: 0;
    }
  </style>
</head>

<body>

  <!-- BACKGROUND VIDEO -->
  <video autoplay muted loop class="bg-video">
    <source src="ship1.mp4" type="video/mp4">
    Your browser does not support HTML5 video.
  </video>

  <!-- OVERLAY -->
  <div class="overlay"></div>

    <!-- LOGO -->
    <img src="logo.png" class="logo" alt="Ozellar Logo">

  <div class="box">
    <h1>Training</h1>
    <h2>Certificate Portal</h2>
    
    

    <br><br>

    <button onclick="window.open('ese.html', '_blank')">
      ENCLOSED SPACE ENTRY
    </button>

    <button onclick="window.open('hazmat.html', '_blank')">
      SAFE HANDLING & TRANSPORT OF SOLID BULK CARGOES
    </button>

    <button onclick="window.open('mh.html', '_blank')">
      MENTAL HEALTH
    </button>

    <button onclick="window.open('hatch.html', '_blank')">
      HATCH COVER
    </button>

    <button onclick="window.open('cadet.html', '_blank')">
      CADET INDUCTION PROGRAM 
    </button>

    <button onclick="window.open('pjf.html', '_blank')">
      PJF
    </button>
    <button onclick="window.open('https://docs.google.com/spreadsheets/d/1Hr6K0NzquEMifYR3OlQH-ungBDNbXEO8deVg9eFjT4A/edit?gid=0#gid=0', '_blank')">
      DATABASE
    </button>
  </div>

</body>
</html>
